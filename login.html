<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Chess.com</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="logo">
        <img src="./src/img/icons/logo.png" alt="Chess.com logo">
    </div> 
    <div class="login-container">
        <form action="submit">
            <input class="input-box" type="text" name="email" id="mail" placeholder="Username or Email-ID">
            <input class="input-box" type="text" name="password" id="password" placeholder="Password">
            <div class="forg-block">
                <a class="link" href="#"><span class="forgot">Forgot Password</span></a>
                <a class="link" href="#"><span class="forgot">Sign Up</span></a>
            </div>             
            <div class="button-container">
                <button class="button" type="submit">Log In</button> 
            </div>
        </form>
    </div>
</body>
</html>
